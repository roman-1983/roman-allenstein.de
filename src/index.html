  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --coral: #F84F4A;
      --bg: #1A1A1A;
      --text: #F5F5F7;
      --text-muted: #98989D;
      --text-subtle: #6E6E73;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4rem;
      position: relative;
    }

    .content {
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      position: relative;
      z-index: 2;
    }

    .logo {
      width: 44px;
      height: 44px;
    }

    h1 {
      font-size: clamp(2.5rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.05;
    }

    .accent-line {
      width: 48px;
      height: 3px;
      background: var(--coral);
      border-radius: 2px;
    }

    .subtitle {
      font-size: 1.0625rem;
      font-weight: 400;
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 480px;
    }

    /* Currently working for */
    .working-for {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      font-size: 0.8125rem;
      color: var(--text-subtle);
    }

    .working-for svg {
      height: 18px;
      width: auto;
    }

    /* Social links */
    .links {
      display: flex;
      gap: 1.5rem;
      margin-top: 0.5rem;
    }

    .links a {
      color: var(--text-subtle);
      text-decoration: none;
      font-size: 0.8125rem;
      font-weight: 400;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.25s ease, transform 0.25s ease;
    }

    .links a:hover {
      color: var(--coral);
      transform: translateY(-1px);
    }

    .link-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* References */
    .references {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .references a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8125rem;
      font-weight: 400;
      color: var(--text-subtle);
      text-decoration: none;
      transition: color 0.25s ease, transform 0.25s ease;
    }

    .references a:hover {
      color: var(--coral);
      transform: translateY(-1px);
    }

    /* Photo - anchored bottom right, cropped */
    .photo {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 45vw;
      max-width: 580px;
      height: 85vh;
      overflow: hidden;
      z-index: 1;
    }

    .photo::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to right, var(--bg) 0%, transparent 40%),
        linear-gradient(to bottom, var(--bg) 0%, transparent 30%);
      pointer-events: none;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .photo {
        width: 50vw;
        height: 60vh;
      }
    }

    @media (max-width: 640px) {
      body {
        overflow: auto;
      }

      .page {
        height: auto;
        min-height: 100vh;
        padding: 2.5rem 1.5rem;
        padding-bottom: 50vh;
        justify-content: flex-start;
        padding-top: 3rem;
      }

      .photo {
        width: 75vw;
        height: 45vh;
      }

      .photo::after {
        background:
          linear-gradient(to right, var(--bg) 0%, transparent 30%),
          linear-gradient(to bottom, var(--bg) 0%, transparent 50%);
      }

      h1 {
        font-size: 2rem;
      }

      .content {
        gap: 1.5rem;
      }
    }
  </style>
</head>
