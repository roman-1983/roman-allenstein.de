services:
  web:
    image: nginx:1-alpine
    container_name: roman-allenstein
    restart: unless-stopped
    volumes:
      # Absolute host path: Dockhand runs in a container, so a relative ./src
      # resolves to its internal /app/data path and the daemon mounts an empty dir.
      - /home/roman/homelab/stacks/Homelab/roman-allenstein-de/src:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - web

networks:
  web:
    external: true
