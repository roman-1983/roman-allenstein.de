services:
  web:
    image: nginx:1-alpine
    container_name: roman-allenstein
    restart: unless-stopped
    volumes:
      - ./src:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.roman-allenstein.rule=Host(`roman-allenstein.de`) || Host(`www.roman-allenstein.de`) || Host(`roman-allenstein-de.anton.lab.roman-allenstein.de`)
      - traefik.http.routers.roman-allenstein.entrypoints=websecure
      - traefik.http.routers.roman-allenstein.tls.certresolver=letsencrypt

networks:
  proxy:
    external: true
